<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hatch and Grow 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #050010;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
    }

    #starfield {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    .nebula {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none; z-index: 0;
    }
    .nebula-1 { width:600px; height:400px; background:rgba(109,40,217,0.25); top:-100px; left:-150px; animation:nebula-drift 18s ease-in-out infinite alternate; }
    .nebula-2 { width:500px; height:500px; background:rgba(29,78,216,0.2);   top:50%;   right:-150px; animation:nebula-drift 22s ease-in-out infinite alternate-reverse; }
    .nebula-3 { width:400px; height:300px; background:rgba(190,24,93,0.15);  bottom:-80px; left:30%; animation:nebula-drift 26s ease-in-out infinite alternate; }
    .nebula-4 { width:350px; height:350px; background:rgba(6,182,212,0.12);  top:20%; left:60%; animation:nebula-drift 20s ease-in-out infinite alternate-reverse; }

    @keyframes nebula-drift {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px,20px) scale(1.1); }
    }

    .floating-egg {
      position: fixed; z-index: 1; pointer-events: none;
      animation: egg-float 6s ease-in-out infinite;
    }
    .floating-egg.egg-tr { top:5%; right:4%; opacity:0.55; }
    .floating-egg.egg-bl { bottom:8%; left:3%; opacity:0.35; animation-delay:-3s; transform:scale(0.6); }

    @keyframes egg-float {
      0%,100% { transform:translateY(0)   rotate(-8deg); }
      25%     { transform:translateY(-18px) rotate(4deg); }
      50%     { transform:translateY(-10px) rotate(-4deg); }
      75%     { transform:translateY(-22px) rotate(6deg); }
    }

    .floating-plant {
      position: fixed; z-index: 1; pointer-events: none;
      bottom: 0; right: 3%;
      animation: plant-sway 5s ease-in-out infinite;
      transform-origin: bottom center;
      opacity: 0.45;
    }
    @keyframes plant-sway {
      0%,100% { transform:rotate(-4deg); }
      50%     { transform:rotate(4deg); }
    }

    .sparkle {
      position: fixed; z-index: 1; pointer-events: none;
      border-radius: 50%; background: #fff;
      animation: sparkle-twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);
    }
    @keyframes sparkle-twinkle {
      0%,100% { opacity:0; transform:scale(0.5); }
      50%     { opacity:1; transform:scale(1.5); }
    }

    .branding {
      text-align: center; margin-bottom: 18px;
      z-index: 10; position: relative;
    }
    .branding-title {
      font-size: 2rem; font-weight: 900; color: #fff;
      letter-spacing: -0.5px;
      text-shadow: 0 0 30px rgba(167,139,250,0.8);
    }
    .branding-title .glow { color: #c4b5fd; }
    .branding-sub {
      font-size: 0.78rem; color: #a78bfa; margin-top: 5px;
      letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600;
    }

    .card {
      background: rgba(15,5,45,0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(167,139,250,0.25);
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 40px rgba(109,40,217,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
      max-width: 680px; width: 100%;
      padding: 40px 44px;
      position: relative; z-index: 10;
      animation: card-in 0.5s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes card-in {
      from { opacity:0; transform:translateY(40px) scale(0.96); }
      to   { opacity:1; transform:translateY(0)    scale(1); }
    }
    @keyframes fade-up {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .animate { animation: fade-up 0.4s cubic-bezier(0.16,1,0.3,1); }

    /* Name screen */
    .name-hero { text-align:center; margin-bottom:30px; }
    .name-hero .egg-anim {
      display:block; margin:0 auto 16px;
      animation: hero-egg 4s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(196,181,253,0.7));
    }
    @keyframes hero-egg {
      0%,100% { transform:translateY(0)    rotate(-6deg) scale(1); }
      30%     { transform:translateY(-20px) rotate(6deg)  scale(1.05); }
      60%     { transform:translateY(-8px)  rotate(-3deg) scale(0.98); }
    }
    .name-hero h2 { font-size:1.6rem; font-weight:800; color:#f0e6ff; margin-bottom:8px; }
    .name-hero p  { color:#9ca3af; font-size:0.92rem; }
    .team-pills { display:flex; gap:8px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
    .pill { padding:6px 14px; border-radius:99px; font-size:0.78rem; font-weight:600; }
    .pill-DA { background:rgba(109,40,217,0.3); color:#c4b5fd; border:1px solid rgba(196,181,253,0.3); }
    .pill-DG { background:rgba(29,78,216,0.3);  color:#93c5fd; border:1px solid rgba(147,197,253,0.3); }
    .pill-PE { background:rgba(5,150,105,0.3);  color:#6ee7b7; border:1px solid rgba(110,231,183,0.3); }

    .input-wrap { position:relative; margin-bottom:20px; }
    .input-wrap label { display:block; font-weight:600; color:#c4b5fd; margin-bottom:8px; font-size:0.88rem; letter-spacing:0.03em; }
    .input-wrap input {
      width:100%; padding:14px 18px;
      background:rgba(255,255,255,0.06);
      border:1.5px solid rgba(167,139,250,0.35); border-radius:14px;
      font-size:1rem; color:#f0e6ff; font-family:'Inter',sans-serif;
      outline:none; transition:all 0.2s;
    }
    .input-wrap input::placeholder { color:rgba(167,139,250,0.4); }
    .input-wrap input:focus {
      border-color:#a78bfa; background:rgba(167,139,250,0.1);
      box-shadow:0 0 0 4px rgba(167,139,250,0.15);
    }

    .start-btn {
      width:100%; padding:16px;
      background:linear-gradient(135deg,#7c3aed,#a855f7,#6366f1);
      color:#fff; border:none; border-radius:14px;
      font-size:1rem; font-weight:700; cursor:pointer;
      font-family:'Inter',sans-serif;
      box-shadow:0 4px 20px rgba(124,58,237,0.5),0 0 40px rgba(168,85,247,0.2);
      transition:transform 0.15s,box-shadow 0.15s;
      animation:btn-glow 3s ease-in-out infinite;
    }
    @keyframes btn-glow {
      0%,100% { box-shadow:0 4px 20px rgba(124,58,237,0.5),0 0 40px rgba(168,85,247,0.2); }
      50%     { box-shadow:0 4px 30px rgba(124,58,237,0.7),0 0 60px rgba(168,85,247,0.4); }
    }
    .start-btn:hover:not(:disabled) { transform:translateY(-2px); }
    .start-btn:disabled { background:rgba(100,80,150,0.3); box-shadow:none; cursor:not-allowed; animation:none; color:#6b7280; }

    /* Quiz screen */
    .quiz-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
    .quiz-title  { font-size:0.88rem; font-weight:700; color:#a78bfa; }
    .quiz-counter {
      font-size:0.8rem; color:#a78bfa; font-weight:600;
      background:rgba(167,139,250,0.15); padding:4px 12px;
      border-radius:99px; border:1px solid rgba(167,139,250,0.25);

    .progress-bar-wrap { background:rgba(255,255,255,0.08); border-radius:99px; height:7px; margin-bottom:26px; overflow:hidden; }
    .progress-bar-fill {
      height:100%; border-radius:99px;
      background:linear-gradient(90deg,#7c3aed,#a855f7,#06b6d4);
      transition:width 0.5s cubic-bezier(0.16,1,0.3,1);
      box-shadow:0 0 10px rgba(168,85,247,0.6);
    }

    .team-badge {
      display:inline-flex; align-items:center; gap:5px;
      font-size:0.72rem; font-weight:700;
      padding:5px 13px; border-radius:99px; margin-bottom:14px;
      letter-spacing:0.05em; text-transform:uppercase;

    .team-DA { background:rgba(109,40,217,0.25); color:#c4b5fd; border:1px solid rgba(196,181,253,0.3); }
    .team-DG { background:rgba(29,78,216,0.25);  color:#93c5fd; border:1px solid rgba(147,197,253,0.3); }
    .team-PE { background:rgba(5,150,105,0.25);  color:#6ee7b7; border:1px solid rgba(110,231,183,0.3); }

    .q-text { font-size:1.05rem; color:#f0e6ff; line-height:1.65; margin-bottom:22px; font-weight:500; white-space:pre-wrap; }

    .options { display:flex; flex-direction:column; gap:10px; }
    .option-btn {

    .option-btn .opt-label { font-weight:800; color:rgba(167,139,250,0.6); flex-shrink:0; font-size:0.82rem; margin-top:1px; width:18px; }
    .option-btn:hover:not(:disabled) {

    .option-btn.correct        { border-color:#34d399; background:rgba(52,211,153,0.15); color:#a7f3d0; box-shadow:0 0 20px rgba(52,211,153,0.2); }
    .option-btn.correct .opt-label { color:#34d399; }
    .option-btn.wrong          { border-color:#f87171; background:rgba(248,113,113,0.15); color:#fca5a5; box-shadow:0 0 20px rgba(248,113,113,0.2); }
    .option-btn.wrong .opt-label { color:#f87171; }
    .option-btn.reveal-correct { border-color:#34d399; background:rgba(52,211,153,0.15); color:#a7f3d0; animation:pulse-correct 0.5s ease; }
    .option-btn.reveal-correct .opt-label { color:#34d399; }
    @keyframes pulse-correct { 0%{transform:scale(1)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }

    .feedback { margin-top:14px; font-size:0.92rem; font-weight:600; min-height:22px; }
    .feedback.correct-msg { color:#34d399; }
    .feedback.wrong-msg   { color:#f87171; }

    .next-btn {
      margin-top:22px; background:linear-gradient(135deg,#7c3aed,#a855f7);
      color:#fff; border:none; border-radius:14px; padding:14px 32px;
      font-size:0.97rem; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif;
      box-shadow:0 4px 20px rgba(124,58,237,0.4);
      transition:transform 0.15s,box-shadow 0.15s; display:none;
    }
    .next-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(124,58,237,0.55); }

    /* Result screen */
    .result { text-align:center; }
    .result-plant { display:flex; justify-content:center; align-items:flex-end; margin-bottom:16px; height:120px; }

    .score-ring {
      width:130px; height:130px; border-radius:50%;
      margin:0 auto 18px; position:relative;
      animation:ring-pop 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    .score-ring::before {
      content:''; position:absolute; inset:-4px; border-radius:50%;
      background:conic-gradient(var(--rc) var(--rp), rgba(255,255,255,0.08) 0);
      z-index:-1;
    }
    .score-ring-inner {
      width:100%; height:100%; border-radius:50%;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      font-size:2.5rem; font-weight:900; color:#fff;
    }
    .score-label { font-size:0.65rem; font-weight:700; letter-spacing:0.1em; opacity:0.8; text-transform:uppercase; }
    @keyframes ring-pop { 0%{transform:scale(0.4);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }

    .score-perfect .score-ring-inner { background:linear-gradient(135deg,#059669,#10b981); box-shadow:0 0 40px rgba(16,185,129,0.5); }
    .score-good    .score-ring-inner { background:linear-gradient(135deg,#7c3aed,#a855f7); box-shadow:0 0 40px rgba(168,85,247,0.5); }
    .score-ok      .score-ring-inner { background:linear-gradient(135deg,#d97706,#f59e0b); box-shadow:0 0 40px rgba(245,158,11,0.5); }
    .score-low     .score-ring-inner { background:linear-gradient(135deg,#dc2626,#ef4444); box-shadow:0 0 40px rgba(239,68,68,0.5); }

    .result h2       { font-size:1.5rem; font-weight:800; color:#f0e6ff; margin-bottom:8px; }
    .result-sub      { color:#9ca3af; margin-bottom:24px; font-size:0.95rem; }
    .result-sub strong { color:#c4b5fd; }
    .saving-msg      { font-size:0.8rem; color:rgba(167,139,250,0.5); margin-bottom:16px; }

    .review    { text-align:left; margin-top:8px; }
    .review h3 { font-size:0.78rem; font-weight:700; color:rgba(167,139,250,0.6); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:12px; }
    .review-item { border-radius:14px; padding:13px 16px; margin-bottom:10px; font-size:0.88rem; line-height:1.5; display:flex; gap:12px; align-items:flex-start; }
    .review-item.correct-item { background:rgba(52,211,153,0.1);   border:1px solid rgba(52,211,153,0.25); }
    .review-item.wrong-item   { background:rgba(248,113,113,0.1);  border:1px solid rgba(248,113,113,0.25); }
    .review-icon  { font-size:1rem; flex-shrink:0; margin-top:2px; }
    .q-label-rv   { font-weight:600; color:#d4b8ff; margin-bottom:4px; font-size:0.87rem; }
    .correct-a-rv { color:#6ee7b7; font-weight:600; font-size:0.84rem; }

    .retry-btn {
      background:linear-gradient(135deg,#7c3aed,#a855f7); color:#fff; border:none;
      border-radius:14px; padding:14px 36px; font-size:0.97rem; font-weight:700;
      cursor:pointer; font-family:'Inter',sans-serif;
      box-shadow:0 4px 20px rgba(124,58,237,0.4);
      transition:transform 0.15s,box-shadow 0.15s; margin-bottom:24px;
    }
    .retry-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(124,58,237,0.55); }

    .footer { margin-top:16px; font-size:0.72rem; color:rgba(167,139,250,0.35); text-align:center; z-index:10; position:relative; letter-spacing:0.1em; }
    #confetti-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; }
  </style>
</head>

<script>
// ── Starfield ────────────────────────────────────────────────────────────────
(function(){
  const cv = document.getElementById('starfield');
  const cx = cv.getContext('2d');
  let W, H, shooters = [];
  const stars = [];

  function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  for(let i=0;i<240;i++) stars.push({
    x: Math.random()*2000, y: Math.random()*1200,
    r: Math.random()*1.8+0.2, alpha: Math.random(),
    spd: Math.random()*0.014+0.003,
    col: ['255,255,255','196,181,253','147,197,253','251,191,36','167,243,208','249,168,212'][Math.floor(Math.random()*6)]
  });

  setInterval(()=>{
    shooters.push({ x:Math.random()*W*0.7, y:Math.random()*H*0.4, vx:6+Math.random()*4, vy:3+Math.random()*3, len:80+Math.random()*120, alpha:1 });
  }, 4000+Math.random()*3000);

  (function draw(){
    cx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      s.alpha += s.spd*(Math.random()>0.5?1:-1);
      s.alpha = Math.max(0.08,Math.min(1,s.alpha));
      cx.beginPath(); cx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);
      cx.fillStyle=`rgba(${s.col},${s.alpha})`; cx.fill();
    });
    shooters.forEach((s,i)=>{
      const g = cx.createLinearGradient(s.x,s.y,s.x-s.len*0.7,s.y-s.len*0.35);
      g.addColorStop(0,`rgba(255,255,255,${s.alpha})`);
      g.addColorStop(1,'rgba(196,181,253,0)');
      cx.beginPath(); cx.strokeStyle=g; cx.lineWidth=1.5;
      cx.moveTo(s.x,s.y); cx.lineTo(s.x-s.len,s.y-s.len*0.5); cx.stroke();
      s.x+=s.vx; s.y+=s.vy; s.alpha-=0.022;
      if(s.alpha<=0) shooters.splice(i,1);
    });
    requestAnimationFrame(draw);
  })();
})();

const TOTAL=6, LABELS=['A','B','C','D'], TICON={DA:'📊',DG:'🔒',PE:'📋'};

function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function pick(){ return shuffle([...shuffle(DA_QUESTIONS).slice(0,2),...shuffle(DG_QUESTIONS).slice(0,2),...shuffle(PE_QUESTIONS).slice(0,2)]); }

let questions=[],current=0,score=0,answered=false,results=[],userName="";

function init(){ questions=[];current=0;score=0;answered=false;results=[];userName=""; renderName(); }

function renderName(){
  document.getElementById('app').innerHTML=`
    <div class="animate">
      <div class="name-hero">
        <svg class="egg-anim" width="90" height="112" viewBox="0 0 80 100">

              <stop offset="0%" stop-color="#f5e6ff"/>
              <stop offset="45%" stop-color="#c4b5fd"/>
              <stop offset="100%" stop-color="#6d28d9"/>
            </radialGradient>
            <filter id="hGlow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <ellipse cx="40" cy="56" rx="31" ry="42" fill="url(#hEgg)" filter="url(#hGlow)"/>
          <ellipse cx="30" cy="43" rx="7" ry="4" fill="white" opacity="0.45" transform="rotate(-25 30 43)"/>
          <circle cx="53" cy="38" r="3" fill="white" opacity="0.3"/>
          <path d="M38 80 L40 72 L37 66 L41 60" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round" fill="none"/>

        </svg>

        <p>6 galaxy questions · 2 from each team</p>
        <div class="team-pills">
          <span class="pill pill-DA">📊 Data Analytics</span>
          <span class="pill pill-DG">🔒 Data Governance</span>
          <span class="pill pill-PE">📋 Programme Eval</span>
        </div>
      </div>
      <div class="input-wrap">
        <label for="nameInput">✦ Enter your name</label>
        <input id="nameInput" type="text" placeholder="e.g. Jane Tan" autocomplete="off"
          oninput="document.getElementById('startBtn').disabled=this.value.trim().length<2"
          onkeydown="if(event.key==='Enter'&&this.value.trim().length>=2)startQuiz()"/>
      </div>
      <button class="start-btn" id="startBtn" disabled onclick="startQuiz()">🚀 Launch Quiz</button>
    </div>`;
  document.getElementById('nameInput').focus();

function startQuiz(){
  userName=document.getElementById('nameInput').value.trim();
  if(!userName)return;
  questions=pick(); current=0;score=0;answered=false;results=[];
  renderQ();
}

function renderQ(){
  const q=questions[current], pct=Math.round((current/TOTAL)*100);
  document.getElementById('app').innerHTML=`
    <div class="animate">
      <div class="quiz-header">
        <span class="quiz-title">🌱 Hatch and Grow 2026</span>
        <span class="quiz-counter">${current+1} / ${TOTAL}</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <span class="team-badge team-${q.team}">${TICON[q.team]} ${q.team} Team</span>
      <div class="q-text">${q.text}</div>
      <div class="options" id="options">
        ${q.options.map((o,i)=>`<button class="option-btn" onclick="selectAnswer(${i})"><span class="opt-label">${LABELS[i]}</span><span>${o}</span></button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQ()">${current<TOTAL-1?'Next Question →':'See My Results →'}</button>
    </div>`;
}

function selectAnswer(chosen){
  if(answered)return; answered=true;
  const q=questions[current],correct=q.answer;
  const btns=document.querySelectorAll('.option-btn'),fb=document.getElementById('feedback');
  btns.forEach(b=>b.disabled=true);
  if(chosen===correct){
    btns[chosen].classList.add('correct');
    fb.innerHTML='✅ Correct! Stellar answer!'; fb.className='feedback correct-msg';
    score++; results.push(true);
  } else {
    btns[chosen].classList.add('wrong'); btns[correct].classList.add('reveal-correct');
    fb.innerHTML=`❌ Not quite! Correct: <strong>${LABELS[correct]}) ${q.options[correct]}</strong>`; fb.className='feedback wrong-msg';
    results.push(false);
  }
  document.getElementById('next-btn').style.display='inline-block';
}

function nextQ(){ answered=false; current++; if(current<TOTAL)renderQ(); else renderResult(); }

async function submitScore(){
  try{
    const details = questions.map((q,i)=>(results[i]?'✓':'✗')+' ['+q.team+'] '+q.text.split('\n')[0].slice(0,80)).join(' | ');
    const res = await fetch(SUPABASE_URL+"/rest/v1/scores", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer "+SUPABASE_KEY,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ name: userName, score, total: TOTAL, details })
    });
    const el=document.getElementById('saving-status');
    if(el) el.textContent = res.ok ? "✦ Score saved to the galaxy log." : "";
  }catch{}
}

function launchConfetti(){
  const cv=document.getElementById('confetti-canvas'),cx=cv.getContext('2d');
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  const cols=['#c4b5fd','#a855f7','#34d399','#fbbf24','#f472b6','#60a5fa','#fff','#86efac'];
  const pieces=Array.from({length:160},()=>({
    x:Math.random()*cv.width, y:-20,
    vx:(Math.random()-0.5)*5, vy:2+Math.random()*4,
    r:4+Math.random()*7, col:cols[Math.floor(Math.random()*cols.length)],
    rot:Math.random()*360, rotV:(Math.random()-0.5)*8, alpha:1
  }));
  let frame=0;
  (function draw(){
    cx.clearRect(0,0,cv.width,cv.height);
    pieces.forEach(p=>{
      cx.save(); cx.globalAlpha=p.alpha; cx.translate(p.x,p.y); cx.rotate(p.rot*Math.PI/180);
      cx.fillStyle=p.col; cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6); cx.restore();
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV; p.vy+=0.07;
      if(p.y>cv.height*0.75)p.alpha-=0.012;
    });
    frame++;
    if(frame<280)requestAnimationFrame(draw); else cx.clearRect(0,0,cv.width,cv.height);
  })();
}

function plantSVG(s){
  const tops=[148,130,115,100,88,76,64][s];
  const stem=`<line x1="35" y1="148" x2="35" y2="${tops+8}" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>`;
  const l1=s>=1?`<path d="M35 ${tops+35} Q20 ${tops+22} 18 ${tops+8} Q29 ${tops+12} 35 ${tops+24}" fill="#4ade80" opacity="0.9"/>`:'';
  const l2=s>=2?`<path d="M35 ${tops+28} Q50 ${tops+15} 52 ${tops+1} Q41 ${tops+5} 35 ${tops+17}" fill="#22c55e" opacity="0.9"/>`:'';
  const l3=s>=3?`<path d="M35 ${tops+16} Q20 ${tops+5} 18 ${tops-9} Q29 ${tops-5} 35 ${tops+5}" fill="#16a34a" opacity="0.85"/>`:'';
  const l4=s>=4?`<path d="M35 ${tops+8} Q50 ${tops-5} 52 ${tops-18} Q41 ${tops-14} 35 ${tops-4}" fill="#22c55e" opacity="0.85"/>`:'';
  const top=s===6
    ?`<circle cx="35" cy="${tops-6}" r="11" fill="#fbbf24" opacity="0.95"/><circle cx="35" cy="${tops-6}" r="7" fill="#f97316"/><circle cx="35" cy="${tops-6}" r="3" fill="#fef08a"/>`
    :s>=5?`<circle cx="35" cy="${tops-2}" r="8" fill="#86efac" opacity="0.9"/><circle cx="35" cy="${tops-7}" r="5" fill="#d1fae5" opacity="0.9"/>`
    :`<circle cx="35" cy="${tops}" r="5" fill="#86efac" opacity="0.8"/>`;
  return `<svg width="70" height="165" viewBox="0 0 70 165">
    <path d="M20 155 L16 165 L54 165 L50 155 Z" fill="#6d28d9" opacity="0.8"/>
    <rect x="16" y="147" width="38" height="9" rx="4.5" fill="#a855f7" opacity="0.9"/>
    ${stem}${l1}${l2}${l3}${l4}${top}
  </svg>`;
}

function renderResult(){
  const pct=score/TOTAL;
  let rClass,msg,emoji,rc;
  if(pct===1)      {rClass='score-perfect';msg='Perfect score! Galaxy brain! 🌌';emoji='🏆';rc='#10b981';launchConfetti();}
  else if(pct>=0.67){rClass='score-good';  msg='Stellar performance! Almost perfect!';emoji='🌟';rc='#a855f7';}
  else if(pct>=0.5) {rClass='score-ok';   msg='Good effort — keep growing!';emoji='🌱';rc='#f59e0b';}
  else              {rClass='score-low';   msg="Keep exploring — you\'ll get there!";emoji='🚀';rc='#ef4444';}

  const rp=`${Math.round(pct*360)}deg`;
  const rev=questions.map((q,i)=>`
    <div class="review-item ${results[i]?'correct-item':'wrong-item'}">
      <div class="review-icon">${results[i]?'✅':'❌'}</div>
      <div>
        <div class="q-label-rv">${q.text.split('\n')[0].slice(0,65)}${q.text.length>65?'…':''}
          <span class="team-badge team-${q.team}" style="font-size:0.6rem;padding:2px 7px;margin-left:5px;">${q.team}</span>
        </div>
        <div class="correct-a-rv">✓ ${LABELS[q.answer]}) ${q.options[q.answer]}</div>
      </div>
    </div>`).join('');

  document.getElementById('app').innerHTML=`
    <div class="animate result">
      <div class="result-plant">${plantSVG(score)}</div>
      <div class="score-ring ${rClass}" style="--rc:${rc};--rp:${rp};">
        <div class="score-ring-inner"><span>${score}/${TOTAL}</span><span class="score-label">Score</span></div>
      </div>
      <h2>${emoji} ${msg}</h2>
      <p class="result-sub">Great work, <strong>${userName}</strong>! You got <strong>${score} out of ${TOTAL}</strong> correct.</p>
      <div class="saving-msg" id="saving-status">Saving your score to the galaxy log…</div>
      <button class="retry-btn" onclick="init()">🔄 Try Again with New Questions</button>
      <div class="review"><h3>✦ Answer Review</h3>${rev}</div>
      <button class="retry-btn" style="margin-top:8px;" onclick="init()">🔄 New Questions</button>
    </div>`;
  submitScore();
}

init();
</script>

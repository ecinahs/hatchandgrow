<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatch & Grow 2026 — DTO Data Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4aa;
    --accent2: #f5a623;
    --accent3: #6c63ff;
    --text: #e8edf5;
    --text-muted: #7a8ba3;
    --correct: #00c97a;
    --wrong: #ff5c5c;
    --da: #6c63ff;
    --dg: #00d4aa;
    --pe: #f5a623;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated mesh background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(108,99,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,212,170,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 50% 50%, rgba(245,166,35,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 20px 60px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 30px;
  }

  .badge {
    display: inline-block;
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(0,212,170,0.3);
    background: rgba(0,212,170,0.08);
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    color: var(--text);
  }

  h1 span {
    display: block;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 12px;
    color: var(--text-muted);
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  /* Progress bar */
  .progress-wrap {
    margin: 28px 0 8px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* Team dots */
  .team-indicators {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 16px 0 28px;
  }

  .team-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }

  .team-dot.da { background: var(--da); box-shadow: 0 0 8px var(--da); }
  .team-dot.dg { background: var(--dg); box-shadow: 0 0 8px var(--dg); }
  .team-dot.pe { background: var(--pe); box-shadow: 0 0 8px var(--pe); }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    flex: 1;
    animation: slideUp 0.4s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--team-color, var(--accent3));
    border-radius: 20px 20px 0 0;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Team tag */
  .team-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 100px;
    margin-bottom: 20px;
    background: rgba(108,99,255,0.12);
    color: var(--team-color, var(--accent3));
    border: 1px solid rgba(108,99,255,0.2);
  }

  .team-tag .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  /* Question number */
  .q-number {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  /* Question text */
  .question-text {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 28px;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--team-color, var(--accent3));
    background: rgba(108,99,255,0.08);
    transform: translateX(4px);
  }

  .option-btn:disabled { cursor: default; }

  .option-label {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 6px;
    background: var(--border);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
  }

  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(0,201,122,0.10);
    color: var(--text);
  }

  .option-btn.correct .option-label {
    background: var(--correct);
    color: #fff;
  }

  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(255,92,92,0.08);
    color: var(--text-muted);
  }

  .option-btn.wrong .option-label {
    background: var(--wrong);
    color: #fff;
  }

  .option-btn.reveal-correct {
    border-color: var(--correct);
    background: rgba(0,201,122,0.06);
  }

  /* Feedback */
  .feedback {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    animation: fadeIn 0.3s ease;
    display: none;
    align-items: center;
    gap: 10px;
    line-height: 1.5;
  }

  .feedback.show { display: flex; }
  .feedback.correct-fb { background: rgba(0,201,122,0.12); border: 1px solid rgba(0,201,122,0.3); color: var(--correct); }
  .feedback.wrong-fb { background: rgba(255,92,92,0.10); border: 1px solid rgba(255,92,92,0.25); color: var(--wrong); }

  .feedback-icon { font-size: 18px; flex-shrink: 0; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Next button */
  .next-btn {
    margin-top: 24px;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
    display: none;
  }

  .next-btn.show { display: block; }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.35); }
  .next-btn:active { transform: translateY(0); }

  /* ---- WELCOME SCREEN ---- */
  .welcome-card {
    text-align: center;
    padding: 48px 32px;
  }

  .welcome-icon {
    font-size: 64px;
    margin-bottom: 20px;
    display: block;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .welcome-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 12px;
    color: var(--text);
  }

  .welcome-desc {
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.7;
    max-width: 400px;
    margin: 0 auto 32px;
  }

  .team-chips {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }

  .chip {
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid;
  }

  .chip.da { color: var(--da); border-color: rgba(108,99,255,0.4); background: rgba(108,99,255,0.08); }
  .chip.dg { color: var(--dg); border-color: rgba(0,212,170,0.4); background: rgba(0,212,170,0.08); }
  .chip.pe { color: var(--pe); border-color: rgba(245,166,35,0.4); background: rgba(245,166,35,0.08); }

  .start-btn {
    padding: 18px 48px;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(108,99,255,0.3);
  }

  .start-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(108,99,255,0.45); }

  /* ---- RESULTS SCREEN ---- */
  .results-card {
    text-align: center;
    padding: 40px 32px;
  }

  .score-ring {
    width: 140px;
    height: 140px;
    margin: 0 auto 28px;
    position: relative;
  }

  .score-ring svg {
    transform: rotate(-90deg);
  }

  .score-ring .ring-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 8;
  }

  .score-ring .ring-fill {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    stroke: url(#ringGrad);
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
  }

  .score-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
  }

  .score-number {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .score-total {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .results-title {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .results-subtitle {
    color: var(--text-muted);
    font-size: 15px;
    margin-bottom: 32px;
  }

  .breakdown {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .breakdown-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    min-width: 130px;
    flex: 1;
  }

  .breakdown-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .breakdown-score {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
  }

  .review-section {
    margin-top: 24px;
    text-align: left;
  }

  .review-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .review-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 14px;
  }

  .review-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }

  .review-q { color: var(--text); line-height: 1.5; flex: 1; }
  .review-q small { display: block; color: var(--text-muted); margin-top: 3px; font-size: 12px; }

  .replay-btn {
    margin-top: 28px;
    width: 100%;
    padding: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .replay-btn:hover { border-color: var(--accent3); color: var(--accent3); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  #app { width: 100%; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">DTO Data Challenge</div>
    <h1>Hatch and Grow<span>2026</span></h1>
    <p class="subtitle">Test your data knowledge across Analytics, Governance & Evaluation</p>
  </div>
  <div id="app"></div>
</div>


</body>
</html>
